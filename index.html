<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


</head>

<body class="bg-info text-white">


    <main class="p-5">

        <div class="d-flex justify-content-center align-items-center ">

           
            <form id="form-login" class="p-2 text-primary-emphasis bg-info-subtle border border-dark-subtle rounded-3 shadow-lg">
            <h2 id="titulo">Login</h2>

                <div class="text-center mb-3" id="c-email">
                    <label for="email"> Email: </label>
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <div class="text-center mb-3" id="c-senha">
                    <label for="password"> Senha: </label>
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>

                <button id="botao-envio" type="submit" class="bg-primary text-white d-block mx-auto mb-4"> Entrar
                </button>

                <div id="mensagem" class="text-center mb-4" ></div>
                <div class="text-center mb-4" id="toggle">
                    <p> Não tem conta? Cadastre-se! </p>
                </div>


            </form>


        </div>

    </main>

    <footer>

    </footer>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="scripts/script.js"></script>
</body>

</html>
